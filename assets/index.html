<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>唐予衡 · 会议录音总结</title>
<style>
:root{--navy:#14233c;--blue:#2563eb;--pale:#eef4ff;--line:#dbe3ef;--red:#dc2626}*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#162033;font:15px/1.6 system-ui,-apple-system,"PingFang SC",sans-serif}header{background:var(--navy);color:white;padding:18px max(20px,calc((100% - 1100px)/2))}header b{font-size:20px}.wrap{max-width:1100px;margin:22px auto;padding:0 16px}.card{background:white;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 18px #1f2c4410}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}label{font-weight:650}input,textarea,select{width:100%;margin-top:5px;padding:11px;border:1px solid #bac7d8;border-radius:9px;font:inherit}textarea{min-height:90px}.wide{grid-column:1/-1}button{border:0;border-radius:9px;padding:11px 16px;background:var(--blue);color:white;font-weight:700;cursor:pointer}button.secondary{background:#e8edf5;color:#172033}button.danger{background:var(--red)}button:disabled{opacity:.45}.toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center}.timer{font-variant-numeric:tabular-nums;font-size:25px;font-weight:750}.dot{width:11px;height:11px;background:var(--red);border-radius:50%;display:inline-block}.muted{color:#64748b}.status{padding:8px 11px;background:var(--pale);border-radius:8px}.hidden{display:none}.cols{display:grid;grid-template-columns:300px 1fr;gap:16px}.meeting{padding:10px;border-bottom:1px solid var(--line);cursor:pointer}.meeting:hover{background:var(--pale)}pre{white-space:pre-wrap;max-height:380px;overflow:auto;background:#f8fafc;padding:12px;border-radius:8px}h2{margin-top:0}h3{border-bottom:1px solid var(--line);padding-bottom:7px}.item{border:1px solid var(--line);padding:10px;border-radius:8px;margin:8px 0}.notice{background:#fff7ed;border:1px solid #fed7aa;padding:10px;border-radius:8px}@media(max-width:720px){.grid,.cols{grid-template-columns:1fr}.card{padding:15px}.wide{grid-column:auto}button{flex:1}.timer{width:100%}}
</style></head><body><header><b>唐予衡 · 会议录音总结</b><div>录音转写 · 结构化纪要 · 人工确认 · 本地归档</div></header><main class="wrap">
<section id="home" class="cols"><div class="card"><h2>历史会议</h2><div id="list" class="muted">加载中…</div></div><div><section class="card"><h2>发起会议</h2><div class="notice"><label><input id="consent" type="checkbox" style="width:auto;margin-right:7px">我已告知参会人员本次会议将被录音</label></div><div class="grid" style="margin-top:12px"><label>会议名称*<input id="title" placeholder="例如：7月经营例会"></label><label>会议时间<input id="date" type="datetime-local"></label><label>会议地点/方式<input id="location" placeholder="会议室 / 腾讯会议"></label><label>主持人<input id="host" placeholder="姓名"></label><label class="wide">参会人员<input id="participants" placeholder="用逗号分隔"></label><label>关联部门/项目<input id="project"></label><label>会议目标<input id="objective"></label></div><div style="margin-top:14px"><button id="create">创建并进入录音</button></div></section></div></section>
<section id="session" class="hidden"><div class="card"><div class="toolbar"><span id="lamp" class="dot"></span><span id="timer" class="timer">00:00:00</span><span id="upload" class="status">等待开始</span></div><h2 id="meetingTitle"></h2><div class="toolbar"><button id="start">开始录音</button><button id="pause" class="secondary" disabled>暂停</button><button id="resume" disabled>继续</button><button id="finish" class="danger" disabled>结束并生成纪要</button><button id="back" class="secondary">返回</button></div><p class="muted">每 30 秒自动保存一个录音片段。请保持页面打开；锁屏可能暂停手机浏览器的麦克风。</p></div>
<div id="processing" class="card hidden"><h2>正在处理</h2><p>正在合并录音、转写并生成结构化纪要。长会议可能需要较长时间，请勿关闭页面。</p></div>
<div id="review" class="card hidden"><h2>人工审核</h2><label>完整逐字稿<textarea id="transcript" style="min-height:240px"></textarea></label><h3>结构化会议纪要（JSON，可直接修改）</h3><textarea id="minutes" style="min-height:520px;font-family:ui-monospace,monospace"></textarea><div class="toolbar" style="margin-top:12px"><button id="confirm">确认并正式归档</button><span id="confirmStatus"></span></div></div></section>
</main><script>
const $=s=>document.querySelector(s);let meetingId=null,rec=null,stream=null,seq=0,seconds=0,tick=null,pending=0,paused=false;
const api=async(url,opt={})=>{const r=await fetch(url,opt);const j=await r.json();if(!r.ok)throw Error(j.error||'操作失败');return j};
function fmt(n){return [n/3600,n%3600/60,n%60].map(x=>String(Math.floor(x)).padStart(2,'0')).join(':')}
async function loadList(){const a=await api('/api/meetings');$('#list').innerHTML=a.length?a.map(x=>`<div class="meeting" data-id="${x.id}"><b>${x.title}</b><br><span class="muted">${x.meeting_date||''} · ${x.status}</span></div>`).join(''):'还没有会议';document.querySelectorAll('.meeting').forEach(x=>x.onclick=()=>openMeeting(x.dataset.id))}
async function openMeeting(id){const m=await api('/api/meetings/'+id);meetingId=id;seq=m.chunk_count||0;$('#home').classList.add('hidden');$('#session').classList.remove('hidden');$('#meetingTitle').textContent=m.title;if(m.status==='draft'||m.status==='confirmed')showReview(m.transcript,m.final_json&&Object.keys(m.final_json).length?m.final_json:m.draft_json);}
$('#create').onclick=async()=>{if(!$('#consent').checked)return alert('请先确认已告知参会人员');if(!$('#title').value.trim())return alert('请填写会议名称');const b={title:$('#title').value,meeting_date:$('#date').value,location:$('#location').value,host:$('#host').value,participants:$('#participants').value,project:$('#project').value,objective:$('#objective').value};const r=await api('/api/meetings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});openMeeting(r.id)};
async function upload(blob,n){pending++;updateUpload();try{await api(`/api/meetings/${meetingId}/chunks`,{method:'POST',headers:{'Content-Type':blob.type||'audio/webm','X-Chunk-Seq':String(n)},body:blob})}finally{pending--;updateUpload()}}
function updateUpload(){ $('#upload').textContent=pending?`正在保存 ${pending} 个片段`:`已保存 ${seq} 个片段` }
async function begin(){stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});rec=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':''});rec.ondataavailable=e=>{if(e.data.size)upload(e.data,seq++)};rec.start(30000);paused=false;tick=setInterval(()=>{if(!paused){seconds++;$('#timer').textContent=fmt(seconds)}},1000);$('#start').disabled=true;$('#pause').disabled=false;$('#finish').disabled=false;updateUpload()}
$('#start').onclick=()=>begin().catch(e=>alert('无法使用麦克风：'+e.message));
$('#pause').onclick=async()=>{rec.pause();paused=true;await api(`/api/meetings/${meetingId}/pause`,{method:'POST'});$('#pause').disabled=true;$('#resume').disabled=false;$('#lamp').style.background='#94a3b8'};
$('#resume').onclick=async()=>{rec.resume();paused=false;await api(`/api/meetings/${meetingId}/resume`,{method:'POST'});$('#pause').disabled=false;$('#resume').disabled=true;$('#lamp').style.background='var(--red)'};
const waitUploads=()=>new Promise((ok,no)=>{let n=0;const t=setInterval(()=>{if(!pending){clearInterval(t);ok()}else if(++n>120){clearInterval(t);no(Error('录音片段上传超时'))}},500)});
$('#finish').onclick=async()=>{if(!confirm('确认结束录音并生成纪要？'))return;$('#finish').disabled=true;rec.stop();stream.getTracks().forEach(t=>t.stop());clearInterval(tick);await new Promise(r=>setTimeout(r,600));try{await waitUploads();await api(`/api/meetings/${meetingId}/stop`,{method:'POST'});$('#processing').classList.remove('hidden');const out=await api(`/api/meetings/${meetingId}/process`,{method:'POST'});$('#processing').classList.add('hidden');showReview(out.transcript,out.draft)}catch(e){$('#processing').classList.add('hidden');alert(e.message);$('#finish').disabled=false}};
function showReview(text,minutes){$('#review').classList.remove('hidden');$('#transcript').value=text||'';$('#minutes').value=JSON.stringify(minutes||{},null,2)}
$('#confirm').onclick=async()=>{try{const minutes=JSON.parse($('#minutes').value);const r=await api(`/api/meetings/${meetingId}/confirm`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transcript:$('#transcript').value,minutes})});$('#confirmStatus').textContent=`已正式归档（版本 ${r.version}）`}catch(e){alert('无法确认：'+e.message)}};
$('#back').onclick=()=>{if(rec&&rec.state!=='inactive')return alert('请先结束当前录音');$('#session').classList.add('hidden');$('#home').classList.remove('hidden');loadList()};
loadList();
</script></body></html>
